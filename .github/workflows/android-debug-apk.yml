name: Build Android Debug APK

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - codex/**

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Cache Android debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Ensure Android debug keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair \
              -v \
              -storepass android \
              -keypass android \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Verify debug APK strings
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          CHECK_DIR="build/apk-string-check"
          rm -rf "$CHECK_DIR"
          mkdir -p "$CHECK_DIR"
          unzip -q "$APK_PATH" -d "$CHECK_DIR"
          grep -R -a "DBG_APK_CLOVA_UI_V2" "$CHECK_DIR"
          grep -R -a "CLOVA 키 저장" "$CHECK_DIR"
          if grep -R -a "local.properties" "$CHECK_DIR"; then
            echo "Legacy CLOVA setup error text is still packaged in the APK" >&2
            exit 1
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: stock-broadcast-catchup-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
